apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarr
  namespace: home-media-server
  labels:
    app: sonarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sonarr
  template:
    metadata:
      labels:
        app: sonarr
    spec:
      containers:
      - name: radarr
        image: linuxserver/sonarr:latest
        env:
          - name: TZ
            value: {{ .Values.TZ }}
        ports:
        - containerPort: 8989

---

apiVersion: v1
kind: Service
metadata:
  name: sonarr
  namespace: home-media-server
spec:
  selector:
    app: sonarr
  type: NodePort
  ports:
    - protocol: TCP
      port: 8989
      nodePort: 31588