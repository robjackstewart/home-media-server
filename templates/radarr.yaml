apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr
  namespace: home-media-server
  labels:
    app: radarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: radarr
  template:
    metadata:
      labels:
        app: radarr
    spec:
      containers:
      - name: radarr
        image: linuxserver/radarr:latest
        env:
          - name: TZ
            value: {{ .Values.TZ }}
        ports:
        - containerPort: 7878

---

apiVersion: v1
kind: Service
metadata:
  name: radarr
  namespace: home-media-server
spec:
  selector:
    app: radarr
  type: NodePort
  ports:
    - protocol: TCP
      port: 7878
      nodePort: 31587