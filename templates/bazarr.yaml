apiVersion: apps/v1
kind: Deployment
metadata:
  name: bazarr
  namespace: home-media-server
  labels:
    app: bazarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bazarr
  template:
    metadata:
      labels:
        app: bazarr
    spec:
      containers:
      - name: bazarr
        image: linuxserver/bazarr:latest
        env:
          - name: TZ
            value: {{ .Values.TZ }}
        ports:
        - containerPort: 6767

---

apiVersion: v1
kind: Service
metadata:
  name: bazarr
  namespace: home-media-server
spec:
  selector:
    app: bazarr
  type: NodePort
  ports:
    - protocol: TCP
      port: 6767
      nodePort: 31591