apiVersion: v1
kind: Service
metadata:
  name: homeassistant-service
spec:
  clusterIP: {{ .Values.homeassistant.clusterIP }}
  ports:
  - name: http
    port: {{ .Values.homeassistant.ports.http }}
    targetPort: {{ .Values.homeassistant.ports.http }}
    protocol: TCP
  selector:
    app: homeassistant
  type: ClusterIP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: homeassistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homeassistant
  template:
    metadata:
      labels:
        app: homeassistant
    spec:
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: media
        - name: config
          persistentVolumeClaim:
            claimName: config
      containers:
        - env:
          - name: TZ
            value: {{ .Values.Timezone }}
          - name: PUID
            value: "{{ .Values.PUID }}"
          - name: PGID
            value: "{{ .Values.PGID }}"
          resources:
            limits:
              memory: 1Gi
          image: {{ include "image" .Values.homeassistant.image }}
          imagePullPolicy: {{ .Values.homeassistant.image.pullPolicy }}
          name: homeassistant
          ports:
            - containerPort: {{ .Values.homeassistant.ports.http }}
          volumeMounts:
            - name: config
              mountPath: /config
              subPath: homeassistant
          livenessProbe:
            exec:
              command:
              - /bin/sh
              - -c
              - curl --silent --output /dev/null --show-error --fail "http://localhost:{{ .Values.homeassistant.ports.http }}"
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
              - /bin/sh
              - -c
              - curl --silent --output /dev/null --show-error --fail "http://localhost:{{ .Values.homeassistant.ports.http }}"
            initialDelaySeconds: 30
            periodSeconds: 10
