name: Home Media Server CI

on:
  - pull_request

env:
  tag: ${GITHUB_RUN_ID}-${GITHUB_RUN_NUMBER}

jobs:
  helm:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install node
        uses: actions/setup-node@v3
        with:
          node-version: 24
      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Start dev container
        run: devcontainer up --workspace-folder .

      - name: Check dependencies
        run: devcontainer exec --workspace-folder . -- task environment:check

      - name: Check environment
        run: devcontainer exec --workspace-folder . -- task environment:check

      - name: Check helm dependency compatability
        run: devcontainer exec --workspace-folder . -- task helm:dependencies:compatability:check

      - name: Build K3D image
        run: devcontainer exec --workspace-folder . -- task k3d:image:build
